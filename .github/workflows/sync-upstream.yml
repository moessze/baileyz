name: Sync Upstream

on:
  schedule:
    # Check every 6 hours
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      from_commit:
        description: 'Start syncing from this upstream commit SHA (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run - show what would be applied without committing'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Apply upstream commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/itsliaaa/baileys.git
          git fetch upstream main --quiet

      - name: Find new upstream commits
        id: diff
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          FROM="${{ github.event.inputs.from_commit }}"
          if [ -n "$FROM" ]; then
            RANGE="${FROM}..upstream/main"
          else
            RANGE="${MERGE_BASE}..upstream/main"
          fi

          COMMITS=$(git log --reverse --pretty=format:"%H	%s	%an	%cd" --date=short "$RANGE" 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
            echo "status=has-updates" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "$COMMITS" > /tmp/upstream_commits.txt
          fi
          echo "merge_base=$MERGE_BASE" >> "$GITHUB_OUTPUT"

      - name: Report - nothing to do
        if: steps.diff.outputs.status == 'up-to-date'
        run: echo "Already up to date with upstream."

      - name: Dry run - list commits
        if: |
          steps.diff.outputs.status == 'has-updates' &&
          github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry run - ${{ steps.diff.outputs.count }} upstream commit(s) would be applied:"
          while IFS=$'\t' read -r sha msg author date; do
            echo "  $sha  [$date] $author - $msg"
          done < /tmp/upstream_commits.txt

      - name: Apply upstream commits
        if: |
          steps.diff.outputs.status == 'has-updates' &&
          github.event.inputs.dry_run != 'true'
        id: apply
        run: |
          APPLIED=0
          SKIPPED=0

          PROTECTED=(
            ".claude/settings.json"
            ".claude/settings.local.json"
            ".github/workflows/sync-upstream.yml"
            "scripts/sync-upstream.sh"
          )

          while IFS=$'\t' read -r sha msg author date; do
            SHORT="${sha:0:10}"

            if [ -n "$msg" ] && git log --format="%s" HEAD | grep -qxF "$msg"; then
              echo "SKIP (already ported): $SHORT - $msg"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "Applying $SHORT: $msg"

            if git cherry-pick --strategy=recursive -X ours --no-commit "$sha" 2>/tmp/cp_err; then
              for p in "${PROTECTED[@]}"; do
                if git ls-files --error-unmatch -- "$p" >/dev/null 2>&1; then
                  git checkout HEAD -- "$p" 2>/dev/null || true
                  git reset HEAD -- "$p" >/dev/null 2>&1 || true
                fi
              done

              if git diff --cached --quiet; then
                echo "NOOP (no diff after protect): $SHORT - $msg"
                git cherry-pick --abort 2>/dev/null || true
                git checkout -- . 2>/dev/null || true
                SKIPPED=$((SKIPPED + 1))
              else
                ORIG_BODY=$(git log --format="%B" -1 "$sha")
                git commit -m "${ORIG_BODY}"$'\n\n'"upstream-commit: ${sha}" --quiet
                echo "APPLIED: $SHORT - $msg"
                APPLIED=$((APPLIED + 1))
              fi
            else
              CP_ERR=$(cat /tmp/cp_err | head -5)
              git cherry-pick --abort 2>/dev/null || true
              echo "CONFLICT (kept fork): $SHORT - $msg"
              SKIPPED=$((SKIPPED + 1))
            fi

          done < /tmp/upstream_commits.txt

          echo "applied=$APPLIED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: |
          steps.diff.outputs.status == 'has-updates' &&
          github.event.inputs.dry_run != 'true' &&
          steps.apply.outputs.applied != '0'
        run: |
          git push origin main
          echo "Pushed ${{ steps.apply.outputs.applied }} new commit(s) to fork."

      - name: Job summary
        if: always()
        run: |
          echo "## Sync Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.diff.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Applied: ${{ steps.apply.outputs.applied || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped: ${{ steps.apply.outputs.skipped || 0 }}" >> "$GITHUB_STEP_SUMMARY"
